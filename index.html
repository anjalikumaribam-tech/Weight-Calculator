<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Price Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #c8f566;
    --accent-dim: rgba(200,245,102,0.12);
    --accent-glow: rgba(200,245,102,0.25);
    --text: #f0f0f0;
    --muted: #6b6b7e;
    --muted2: #3a3a4a;
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.1);
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(200,245,102,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(245,200,66,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease both;
  }

  .logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-dim);
    border: 1px solid rgba(200,245,102,0.2);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .logo-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 0.6rem;
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    font-family: var(--font-mono);
  }

  /* Tab bar */
  .tab-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .tab {
    padding: 11px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-display);
    letter-spacing: 0.01em;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.25s ease;
    position: relative;
  }

  .tab.active {
    background: var(--card);
    color: var(--accent);
    box-shadow: 0 0 0 1px rgba(200,245,102,0.2);
  }

  .tab:hover:not(.active) { color: var(--text); }

  /* Main card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  .card:hover { border-color: var(--border-hover); }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field-grid { display: grid; gap: 12px; }

  .field {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.04em;
    padding-left: 2px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .currency-symbol, .unit-badge {
    position: absolute;
    left: 14px;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    pointer-events: none;
    font-family: var(--font-mono);
    transition: color 0.2s;
  }

  .unit-badge {
    left: auto;
    right: 14px;
    font-size: 12px;
    background: var(--muted2);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 0.06em;
    font-family: var(--font-display);
  }

  input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 17px;
    font-weight: 500;
    font-family: var(--font-mono);
    padding: 13px 48px 13px 40px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
    appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]::placeholder { color: var(--muted2); font-size: 15px; }

  input[type="number"]:focus {
    border-color: rgba(200,245,102,0.35);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input[type="number"]:focus + .unit-badge { color: var(--accent); background: var(--accent-dim); }

  .input-wrap:focus-within .currency-symbol { color: var(--accent); }

  /* Weight row */
  .weight-grid {
    display: grid;
    grid-template-columns: 1fr 12px 1fr;
    gap: 0;
    align-items: end;
  }

  .weight-sep {
    text-align: center;
    color: var(--muted2);
    font-size: 18px;
    font-weight: 300;
    padding-bottom: 13px;
  }

  /* Result */
  .result-card {
    background: linear-gradient(135deg, #1a1f10 0%, #141a0c 100%);
    border: 1px solid rgba(200,245,102,0.2);
    border-radius: 20px;
    padding: 1.75rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s 0.3s ease both;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(200,245,102,0.08) 0%, transparent 65%);
    pointer-events: none;
  }

  .result-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.2rem;
  }

  .result-label-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(200,245,102,0.5);
  }

  .result-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(200,245,102,0.15);
    border-radius: 6px;
    padding: 3px 10px;
  }

  .result-amount {
    font-size: clamp(2.2rem, 8vw, 3rem);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.04em;
    font-family: var(--font-mono);
    line-height: 1;
    transition: all 0.3s ease;
    min-height: 3rem;
    display: flex;
    align-items: center;
  }

  .result-amount.pop {
    animation: pop 0.3s ease;
  }

  .result-summary {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(200,245,102,0.08);
    font-size: 12px;
    color: rgba(200,245,102,0.4);
    font-family: var(--font-mono);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .summary-chip {
    background: rgba(200,245,102,0.06);
    border: 1px solid rgba(200,245,102,0.1);
    border-radius: 6px;
    padding: 3px 10px;
    color: rgba(200,245,102,0.5);
    font-size: 11px;
  }

  /* Divider with text */
  .or-divider {
    text-align: center;
    position: relative;
    margin: 0.5rem 0 1rem;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.1em;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 11px;
    color: var(--muted2);
    font-family: var(--font-mono);
    animation: fadeUp 0.5s 0.4s ease both;
  }

  /* Animations */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes pop      { 0% { transform:scale(1); } 50% { transform:scale(1.04); } 100% { transform:scale(1); } }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="logo-pill"><span class="logo-dot"></span> Smart Calculator</div>
    
    
  </div>

  <div class="tab-bar">
    <button class="tab active" id="tab-total" onclick="switchTab('total')">⚖ By Price</button>
    <button class="tab" id="tab-price" onclick="switchTab('price')">₹ By Rate</button>
  </div>

  <!-- Panel: Total Rupess -->
  <div id="panel-total">
    <div class="card">
      <div class="card-label">Rate per Kilogram</div>
      <div class="field-grid">
        <div class="field">
          <label>Price (₹ per kg)</label>
          <div class="input-wrap">
            <span class="currency-symbol">₹</span>
            <input type="number" id="t-rate" placeholder="150" min="0" oninput="calcTotal()">
            <span class="unit-badge">/kg</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Weight</div>
      <div class="field-grid">
        <div class="weight-grid">
          <div class="field">
            <label>Kilogram</label>
            <div class="input-wrap">
              <input type="number" id="t-kg" placeholder="0" min="0" oninput="calcTotal()" style="padding-left:14px;">
              <span class="unit-badge">kg</span>
            </div>
          </div>
          <div class="weight-sep">+</div>
          <div class="field">
            <label>Gram</label>
            <div class="input-wrap">
              <input type="number" id="t-gm" placeholder="0" min="0" max="999" oninput="calcTotal()" style="padding-left:14px;">
              <span class="unit-badge">g</span>
            </div>
          </div>
        </div>
        <p style="font-size:11px; color:var(--muted); font-family:var(--font-mono); padding-left:2px;">e.g. 1kg 500g = 1.5 kg</p>
      </div>
    </div>

    <div class="result-card">
      <div class="result-top">
        <span class="result-label-text">Total Rupees</span>
        <span class="result-tag" id="t-tag">—</span>
      </div>
      <div class="result-amount" id="t-result">—</div>
      <div class="result-summary" id="t-summary" style="display:none;">
        <span class="summary-chip" id="t-s1"></span>
        <span class="summary-chip" id="t-s2"></span>
        <span class="summary-chip" id="t-s3"></span>
      </div>
    </div>
  </div>

  <!-- Panel: Rate Nikalo -->
  <div id="panel-price" style="display:none;">
    <div class="card">
      <div class="card-label">Aapne Kitna Paisa Diya</div>
      <div class="field-grid">
        <div class="field">
          <label>Diya hua paisa (₹)</label>
          <div class="input-wrap">
            <span class="currency-symbol">₹</span>
            <input type="number" id="p-paid" placeholder="350" min="0" oninput="calcPrice()">
            <span class="unit-badge">₹</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Wajan Darj Karein</div>
      <div class="field-grid">
        <div class="weight-grid">
          <div class="field">
            <label>Kilogram</label>
            <div class="input-wrap">
              <input type="number" id="p-kg" placeholder="0" min="0" oninput="calcPrice()" style="padding-left:14px;">
              <span class="unit-badge">kg</span>
            </div>
          </div>
          <div class="weight-sep">+</div>
          <div class="field">
            <label>Gram</label>
            <div class="input-wrap">
              <input type="number" id="p-gm" placeholder="0" min="0" max="999" oninput="calcPrice()" style="padding-left:14px;">
              <span class="unit-badge">g</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="result-card">
      <div class="result-top">
        <span class="result-label-text">Rate per kg</span>
        <span class="result-tag" id="p-tag">—</span>
      </div>
      <div class="result-amount" id="p-result">—</div>
      <div class="result-summary" id="p-summary" style="display:none;">
        <span class="summary-chip" id="p-s1"></span>
        <span class="summary-chip" id="p-s2"></span>
        <span class="summary-chip" id="p-s3"></span>
      </div>
    </div>
  </div>

  <div class="footer">made for smart shoppers · every rupee counts</div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('panel-total').style.display = tab === 'total' ? '' : 'none';
  document.getElementById('panel-price').style.display = tab === 'price' ? '' : 'none';
  document.getElementById('tab-total').className = 'tab' + (tab === 'total' ? ' active' : '');
  document.getElementById('tab-price').className = 'tab' + (tab === 'price' ? ' active' : '');
}

function getWeight(kgId, gmId) {
  const kg = parseFloat(document.getElementById(kgId).value) || 0;
  const gm = parseFloat(document.getElementById(gmId).value) || 0;
  return kg + gm / 1000;
}

function animatePop(id) {
  const el = document.getElementById(id);
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function calcTotal() {
  const rate = parseFloat(document.getElementById('t-rate').value);
  const kg = parseFloat(document.getElementById('t-kg').value) || 0;
  const gm = parseFloat(document.getElementById('t-gm').value) || 0;
  const weight = kg + gm / 1000;
  const res = document.getElementById('t-result');
  const tag = document.getElementById('t-tag');
  const summary = document.getElementById('t-summary');

  if (!rate || weight === 0) {
    res.textContent = '—'; tag.textContent = '—';
    summary.style.display = 'none'; return;
  }

  const total = rate * weight;
  res.textContent = '₹ ' + total.toFixed(2);
  tag.textContent = 'Calculated ✓';
  animatePop('t-result');

  document.getElementById('t-s1').textContent = weight.toFixed(3) + ' kg';
  document.getElementById('t-s2').textContent = '₹' + rate + '/kg';
  document.getElementById('t-s3').textContent = '= ₹' + total.toFixed(2);
  summary.style.display = 'flex';
}

function calcPrice() {
  const paid = parseFloat(document.getElementById('p-paid').value);
  const kg = parseFloat(document.getElementById('p-kg').value) || 0;
  const gm = parseFloat(document.getElementById('p-gm').value) || 0;
  const weight = kg + gm / 1000;
  const res = document.getElementById('p-result');
  const tag = document.getElementById('p-tag');
  const summary = document.getElementById('p-summary');

  if (!paid || weight === 0) {
    res.textContent = '—'; tag.textContent = '—';
    summary.style.display = 'none'; return;
  }

  const rate = paid / weight;
  res.textContent = '₹ ' + rate.toFixed(2) + '/kg';
  tag.textContent = 'Calculated ✓';
  animatePop('p-result');

  document.getElementById('p-s1').textContent = weight.toFixed(3) + ' kg';
  document.getElementById('p-s2').textContent = '₹' + paid + ' diye';
  document.getElementById('p-s3').textContent = '= ₹' + rate.toFixed(2) + '/kg';
  summary.style.display = 'flex';
}
</script>
</body>
</html>
